# Prometheus scrape configuration.
# Prometheus polls each service's /metrics endpoint every 15 seconds and stores the data.
# Grafana then reads from Prometheus to build dashboards.
# We uncomment each service's job as we build and add it to docker-compose.

global:
  scrape_interval: 15s       # How often Prometheus scrapes metrics from each target
  evaluation_interval: 15s   # How often Prometheus evaluates alerting rules

scrape_configs:

  # Prometheus scrapes itself (useful for monitoring the monitoring system)
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

